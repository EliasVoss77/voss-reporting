<!DOCTYPE html>
<html>

<head>
<title>VOSS Reporting</title>

<style>

body{
font-family: Arial;
background:#111;
color:white;
text-align:center;
padding:40px;
}

input, textarea{
width:300px;
padding:10px;
margin:10px;
border-radius:5px;
border:none;
}

button{
padding:12px 25px;
background:#2ecc71;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#27ae60;
}

</style>

</head>


<body>

<h1>VOSS Reporting</h1>
<p>Virtual Operating System Synopsis Reporting</p>

<h2>Submit Initial Report</h2>

<form id="reportForm">

<input type="text" id="name" placeholder="Name" required><br>

<input type="text" id="department" placeholder="Department - Position"><br>

<textarea id="issue" placeholder="Paste Initial Document" rows="5" required></textarea><br>

<button type="submit">Submit Report</button>
<br><br>

<button type="button" onclick="viewReports()">View Reports</button>

<button type="button" onclick="generateSummary()">VOSS Summary</button>
</form>

<p id="status"></p>
<div id="reportViewer"></div>

<script>

document.getElementById("reportForm").addEventListener("submit", function(e){

e.preventDefault();

let report = {
name: document.getElementById("name").value,
department: document.getElementById("department").value,
issue: document.getElementById("issue").value,
time: new Date().toISOString()
};

let reports = JSON.parse(localStorage.getItem("vossReports")) || [];

reports.push(report);

localStorage.setItem("vossReports", JSON.stringify(reports));

document.getElementById("status").innerText =
"Report submitted successfully.";

document.getElementById("reportForm").reset();

});

function viewReports(){

let reports = JSON.parse(localStorage.getItem("vossReports")) || [];

let output = "<h2>Submitted Reports</h2>";

reports.forEach(function(r){

output += `
<div style="background:#222;padding:15px;margin:15px;border-radius:8px;">
<b>Name:</b> ${r.name}<br>
<b>Department:</b> ${r.department}<br>
<b>Report:</b><br>${r.issue}<br><br>
<small>${r.time}</small>
</div>
`;

});

document.getElementById("reportViewer").innerHTML = output;

}

</script>


</body>

</html>
