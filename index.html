<!DOCTYPE html>
<html>

<head>
<title>VOSS Reporting</title>

<style>

body{
font-family: Arial, sans-serif;
background:#111;
color:white;
text-align:center;
padding:40px;
}

input, textarea{
width:320px;
padding:10px;
margin:10px;
border-radius:6px;
border:none;
}

button{
padding:12px 25px;
background:#2ecc71;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
margin:5px;
}

button:hover{
background:#27ae60;
}

.report{
background:#222;
padding:15px;
margin:15px auto;
border-radius:8px;
max-width:700px;
text-align:left;
}

#summary{
background:#181818;
padding:20px;
margin-top:30px;
border-radius:10px;
max-width:800px;
margin-left:auto;
margin-right:auto;
text-align:left;
}

</style>

</head>

<body>

<h1>VOSS Reporting</h1>
<p>Virtual Operating System Synopsis Reporting</p>

<h2>Submit Report</h2>

<form id="reportForm">

<input type="text" id="name" placeholder="Name" required><br>

<input type="text" id="department" placeholder="Department - Position"><br>

<textarea id="issue" placeholder="Paste Task Analysis Here" rows="6" required></textarea><br>

<button type="submit">Submit Report</button>

</form>

<br>

<button onclick="generateSummary()">VOSS Value Report</button>

<button onclick="clearReports()">Clear Session</button>

<h2>Submitted Reports</h2>

<div id="reports"></div>

<div id="summary"></div>

<script>

let reports = [];

document.getElementById("reportForm").addEventListener("submit", function(e){

e.preventDefault();

let report = {
name: document.getElementById("name").value,
department: document.getElementById("department").value,
text: document.getElementById("issue").value
};

reports.push(report);

displayReports();

document.getElementById("reportForm").reset();

});

function displayReports(){

let container = document.getElementById("reports");

container.innerHTML = "";

reports.forEach(r => {

container.innerHTML += `
<div class="report">
<b>${r.name}</b> — ${r.department}<br><br>
${r.text}
</div>
`;

});

}

function generateSummary(){

if(reports.length === 0){

document.getElementById("summary").innerHTML =
"<h2>VOSS Value Report</h2>No reports submitted.";

return;

}

let combined = reports.map(r => r.text).join(" ");

let hoursSaved = reports.length * 20;

let valueLow = reports.length * 5000;

let valueHigh = reports.length * 10000;

let summary = `
<h2>VOSS Intelligence Report</h2>

<b>Reports analyzed:</b> ${reports.length}<br><br>

<b>Compiled Insight Dataset:</b><br>
${combined.substring(0,900)}...
<br><br>

<b>Estimated Effort Saved:</b><br>
~${hoursSaved} hours
<br><br>

<b>Projected Economic Value:</b><br>
$${valueLow.toLocaleString()} – $${valueHigh.toLocaleString()}
<br><br>

<b>Recommended Next Step:</b><br>
Expand dataset and compare outputs across multiple AI systems.
`;

document.getElementById("summary").innerHTML = summary;

}

function clearReports(){

reports = [];

document.getElementById("reports").innerHTML = "";

document.getElementById("summary").innerHTML = "";

}

</script>

</body>

</html>
