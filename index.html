<!DOCTYPE html>
<html>

<head>
<title>VOSS Reporting</title>

<style>

body{
font-family: Arial, sans-serif;
background:#111;
color:white;
text-align:center;
padding:40px;
}

input, textarea{
width:320px;
padding:10px;
margin:10px;
border-radius:6px;
border:none;
}

button{
padding:12px 25px;
background:#2ecc71;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
margin:5px;
}

button:hover{
background:#27ae60;
}

.report{
background:#222;
padding:15px;
margin:15px auto;
border-radius:8px;
max-width:700px;
text-align:left;
}

#summary{
background:#181818;
padding:20px;
margin-top:30px;
border-radius:10px;
max-width:800px;
margin-left:auto;
margin-right:auto;
text-align:left;
}

</style>

</head>

<body>

<h1>VOSS Reporting</h1>
<p>Virtual Operating System Synopsis Reporting</p>

<h2>Submit Report</h2>

<form id="reportForm">

<input type="text" id="name" placeholder="Name" required><br>

<input type="text" id="department" placeholder="Department - Position"><br>

<textarea id="issue" placeholder="Paste Task Analysis Here" rows="6" required></textarea><br>

<button type="submit">Submit Report</button>

</form>

<br>

<button onclick="generateSummary()">VOSS Value Report</button>

<button onclick="clearReports()">Clear Session</button>

<h2>Submitted Reports</h2>

<div id="reports"></div>

<div id="summary"></div>

<script>

let reports = [];

document.getElementById("reportForm").addEventListener("submit", function(e){

e.preventDefault();

let report = {
name: document.getElementById("name").value,
department: document.getElementById("department").value,
text: document.getElementById("issue").value
};

reports.push(report);

displayReports();

document.getElementById("reportForm").reset();

});

function displayReports(){

let container = document.getElementById("reports");

container.innerHTML = "";

reports.forEach(r => {

container.innerHTML += `
<div class="report">
<b>${r.name}</b> — ${r.department}<br><br>
${r.text}
</div>
`;

});

}

function generateSummary(){

let reports = JSON.parse(localStorage.getItem("vossReports")) || [];

let totalHours = 0;
let totalValue = 0;
let totalAIContribution = 0;

let categories = {};
let combinedText = "";

reports.forEach(function(r){

let text = r.issue;

combinedText += text + " ";

let hoursMatch = text.match(/Hours Saved:\s*(\d+)/i);
if(hoursMatch){
totalHours += parseInt(hoursMatch[1]);
}

let valueMatch = text.match(/Economic Value:\s*\$?(\d+)/i);
if(valueMatch){
totalValue += parseInt(valueMatch[1]);
}

let aiMatch = text.match(/AI Contribution:\s*(\d+)/i);
if(aiMatch){
totalAIContribution += parseInt(aiMatch[1]);
}

let categoryMatch = text.match(/Task Category:\s*([A-Za-z]+)/i);
if(categoryMatch){

let cat = categoryMatch[1];

if(!categories[cat]){
categories[cat] = 0;
}

categories[cat]++;

}

});

let avgAI = reports.length ? (totalAIContribution / reports.length).toFixed(1) : 0;

let categoryHTML = "";

for(let c in categories){
categoryHTML += c + ": " + categories[c] + "<br>";
}

let summary = `
<h2>VOSS Intelligence Report</h2>

<b>Reports analyzed:</b> ${reports.length}<br><br>

<b>Total Productivity Hours Saved:</b><br>
${totalHours} hours<br><br>

<b>Total Economic Value Identified:</b><br>
$${totalValue.toLocaleString()}<br><br>

<b>Average AI Contribution:</b><br>
${avgAI}%<br><br>

<b>Task Category Distribution:</b><br>
${categoryHTML}<br>

<b>Compiled Insight Dataset:</b><br>
${combinedText.substring(0,700)}...
`;

document.getElementById("summary").innerHTML = summary;

}

function clearReports(){

reports = [];

document.getElementById("reports").innerHTML = "";

document.getElementById("summary").innerHTML = "";

}

</script>

</body>

</html>
