<!DOCTYPE html>
<html>

<head>
<title>VOSS Reporting</title>

<style>

body{
font-family: Arial, sans-serif;
background:#111;
color:white;
text-align:center;
padding:40px;
}

input, textarea{
width:320px;
padding:10px;
margin:10px;
border-radius:6px;
border:none;
}

button{
padding:12px 25px;
background:#2ecc71;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
margin:5px;
}

button:hover{
background:#27ae60;
}

.report{
background:#222;
padding:15px;
margin:15px auto;
border-radius:8px;
max-width:700px;
text-align:left;
}

#summary{
background:#181818;
padding:20px;
margin-top:30px;
border-radius:10px;
max-width:800px;
margin-left:auto;
margin-right:auto;
text-align:left;
}

</style>

</head>

<body>

<h1>VOSS Reporting</h1>
<p>Virtual Operating System Synopsis Reporting</p>

<h2>Submit Report</h2>

<form id="reportForm">

<input type="text" id="name" placeholder="Name" required><br>

<input type="text" id="department" placeholder="Department - Position"><br>

<textarea id="issue" placeholder="Paste Chat Here" rows="6" required></textarea><br>

<button type="submit">Submit Report</button>

</form>

<br>

<button onclick="generateAiReport()">VOSS Value Report</button>
<button onclick="clearReports()">Clear Session</button>

<div id="ai-report-container" class="report"></div>

  Update the JS to Display AI Report

<h2>Submitted Reports</h2>

<div id="reports"></div>

<div id="summary"></div>

<script>
let reports = [];
// REPLACE WITH YOUR ACTUAL WORKER URL
const WORKER_URL = "https://your-worker-name.your-subdomain.workers.dev"; 
// REPLACE WITH YOUR API KEY (Ideally, store this in a secure env var or use a proxy, but for dev this works)
const API_KEY = "your-secret-api-key-here"; 

window.onload = function() {
    const saved = localStorage.getItem("vossReports");
    if (saved) {
        reports = JSON.parse(saved);
        displayReports();
    }
};

document.getElementById("reportForm").addEventListener("submit", function(e){
    e.preventDefault();
    let report = {
        name: document.getElementById("name").value,
        department: document.getElementById("department").value,
        text: document.getElementById("issue").value
    };
    reports.push(report);
    localStorage.setItem("vossReports", JSON.stringify(reports));
    displayReports();
    document.getElementById("reportForm").reset();
});

function displayReports(){
    let container = document.getElementById("reports");
    container.innerHTML = "";
    reports.forEach(r => {
        container.innerHTML += `
        <div class="report">
            <b>${r.name}</b> - ${r.department}<br><br>
            <small>${r.text.substring(0, 100)}...</small>
        </div>`;
    });
}

async function generateAiReport() {
    const container = document.getElementById("ai-report-container");
    const summaryDiv = document.getElementById("summary");
    
    if (reports.length === 0) {
        alert("No reports to analyze.");
        return;
    }

    container.innerHTML = "<p>🤖 Analyzing with AI...</p>";
    summaryDiv.innerHTML = "";

    try {
        // We will analyze the LAST report added for now, or loop through all
        // Let's analyze the most recent one first to test
        const latestReport = reports[reports.length - 1];

        const response = await fetch(WORKER_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "x-api-key": API_KEY
            },
            body: JSON.stringify({ chat: latestReport.text })
        });

        if (!response.ok) throw new Error("Worker Error: " + response.statusText);

        const data = await response.json();

        // data is now the parsed JSON object from the worker
        // Example: { tasks: [...], hoursSaved: 5, ... }

        // Format the data into HTML
        const html = `
            <h2>VOSS Analysis Report</h2>
            <p><strong>Source:</strong> $${latestReport.name} ($${latestReport.department})</p>
            <hr>
            <p><strong>Tasks Identified:</strong> ${data.tasks.join(", ") || "None detected"}</p>
            <p><strong>Hours Saved:</strong> ${data.hoursSaved}</p>
            <p><strong>Economic Value:</strong> $${data.economicValue}</p>
            <p><strong>Projected Value:</strong> ${data.projectedValue}</p>
            <p><strong>AI Contribution:</strong> ${data.aiContribution}</p>
            <p><strong>Human Contribution:</strong> ${data.humanContribution}</p>
            <p><strong>Category:</strong> ${data.category || "Uncategorized"}</p>
        `;

        summaryDiv.innerHTML = html;
        container.innerHTML = "<p>✅ Analysis Complete!</p>";

    } catch (error) {
        console.error(error);
        container.innerHTML = `<p style="color:red;">❌ Error: ${error.message}</p>`;
    }
}

function clearReports(){
    if(confirm("Clear all data?")) {
        reports = [];
        localStorage.removeItem("vossReports");
        displayReports();
        document.getElementById("summary").innerHTML = "";
        document.getElementById("ai-report-container").innerHTML = "";
    }
}
</script>
</body>

</html>
